<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Zen+Dots&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        *{
            background-color: rgb(47, 158, 223);
        }
        h1 {
            color: white;
            font-family: 'Zen Dots', sans-serif;
            margin-top:30px;
            text-align: center;
        }
        h3{
            color: rgb(255, 255, 255);
            font-family: 'Bitcount Grid Double', sans-serif;
            margin-top:20px;
            text-align: center;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 40px 0;
        }
        .bloco{
            width:120px;
            height:120px;
            border-radius:10px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box1{background: red;}
        .box2{background: rgb(179, 23, 23);}
        .box3{background: rgb(197, 50, 50);}

        .box4{background: green;}
        .box5{background:rgb(27, 233, 27);}
        .box6{background:rgb(31, 136, 31);}
        .box7{background:rgb(8, 61, 8);}
        .box8{background:rgb(102, 252, 102);}
        .box9{background:rgb(111, 182, 111);}
    </style>
</head>
<body>
    <h1>XD</h1>
    <p></p>
    <h3 class="deixarBonito"> VARIAÇÕES DE VERMELHO</h3>
    <div class="container">
        
        <div class="bloco box1"></div>
        <div class="bloco box2"></div>
        <div class="bloco box3"></div>

    </div>
    <h3 class="deixarBonito"> VARIAÇÕES DE VERDE</h3>
    <div class="container">

        <div class="bloco box4"></div>
        <div class="bloco box5"></div>
        <div class="bloco box6"></div>
        <div class="bloco box7"></div>
        <div class="bloco box8"></div>
        <div class="bloco box9"></div>

    </div>

    <h3>Obrigado por ver o site - demorou 2 anos pra fazer ele</h3>
</body>
</html>
